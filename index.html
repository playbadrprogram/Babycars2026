<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Monster Truck Race 3D V2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: sans-serif;
}

#hud {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
    z-index: 10;
    font-size: 14px;
}

#mobileControls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    display: flex;
    gap: 10px;
}

button {
    padding: 12px;
    font-size: 16px;
}
</style>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<div id="hud">
🚗 السرعة: <span id="speed">0</span><br>
🏁 المسافة: <span id="dist">0</span><br>
⭐ النقاط: <span id="score">0</span><br>
</div>

<div id="mobileControls">
<button onclick="tap('up')">⬆️</button>
<button onclick="tap('left')">⬅️</button>
<button onclick="tap('down')">⬇️</button>
<button onclick="tap('right')">➡️</button>
</div>

<script>

// ======================
// BASIC SETUP
// ======================
let scene, camera, renderer;
let car;
let speed = 0;
let maxSpeed = 3;
let acceleration = 0.03;
let friction = 0.97;

let keys = {};
let started = false;
let paused = false;
let isCrashed = false;

let distance = 0;
let score = 0;

let traffic = [];
let lanes = [-4, 0, 4];

init();
createStartScreen();
animate();

// ======================
// INIT
// ======================
function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        2000
    );

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 0.8);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);

    scene.add(light, sun);

    camera.position.set(0, 5, 10);

    createWorld();
    car = createCar();
    createTraffic();

    // render initial frame so user sees scene before بدء اللعب
    renderer.render(scene, camera);
}

// ======================
// WORLD
// ======================
function createWorld() {

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(2000, 2000),
        new THREE.MeshLambertMaterial({ color: 0x4caf50 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    scene.add(ground);

    const road = new THREE.Mesh(
        new THREE.BoxGeometry(20, 0.5, 2000),
        new THREE.MeshLambertMaterial({ color: 0x333333 })
    );
    scene.add(road);

    for (let i = 0; i < 80; i++) {
        const line = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.1, 5),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        line.position.set(0, 0.3, -i * 25);
        scene.add(line);
    }
}

// ======================
// CAR
// ======================
function createCar() {

    const car = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1.2, 6),
        new THREE.MeshLambertMaterial({ color: 0xe63946 })
    );
    body.position.y = 1.5;

    car.add(body);

    car.position.set(0, 0, 5);
    scene.add(car);

    return car;
}

// ======================
// TRAFFIC
// ======================
function createTrafficCar() {

    const c = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 1, 4.5),
        new THREE.MeshLambertMaterial({
            color: Math.random() * 0xffffff
        })
    );
    body.position.y = 1.2;

    c.add(body);

    resetTrafficCar(c);

    scene.add(c);
    return c;
}

function resetTrafficCar(c) {
    c.position.x = lanes[Math.floor(Math.random() * lanes.length)];
    c.position.z = car.position.z - 200 - Math.random() * 400;
}

function createTraffic() {
    for (let i = 0; i < 8; i++) {
        traffic.push(createTrafficCar());
    }
}

// ======================
// INPUT
// ======================
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function tap(dir) {
    if (dir === "up") keys["arrowup"] = true;
    if (dir === "down") keys["arrowdown"] = true;
    if (dir === "left") keys["arrowleft"] = true;
    if (dir === "right") keys["arrowright"] = true;

    setTimeout(() => keys = {}, 150);
}

// ======================
// CAR UPDATE
// ======================
function updateCar() {

    if (!car) return;

    if (keys["arrowup"] || keys["w"]) speed += acceleration;
    if (keys["arrowdown"] || keys["s"]) speed -= acceleration * 1.5;

    speed *= friction;
    speed = Math.max(0, Math.min(maxSpeed, speed));

    if (keys["arrowleft"]) car.position.x -= 0.15;
    if (keys["arrowright"]) car.position.x += 0.15;

    car.position.z -= speed * 2;

    camera.position.x += (car.position.x - camera.position.x) * 0.08;
    camera.position.z = car.position.z + 10;
    camera.position.y = 6;
    camera.lookAt(car.position);
}

// ======================
// TRAFFIC UPDATE
// ======================
function updateTraffic() {

    traffic.forEach(t => {

        t.position.z += 0.6 + speed * 2;

        if (t.position.z > car.position.z + 20) {
            resetTrafficCar(t);
        }

        if (Math.abs(t.position.x - car.position.x) < 2 &&
            Math.abs(t.position.z - car.position.z) < 3) {
            crash();
        }
    });
}

// ======================
// CRASH
// ======================
function crash() {

    if (isCrashed) return;

    isCrashed = true;
    speed = 0;

    cameraShake();

    alert("💥 تحطّم!");

    setTimeout(resetGame, 1200);
}

function resetGame() {
    isCrashed = false;
    car.position.set(0, 0, 5);
    speed = 0;
}

// ======================
// CAMERA SHAKE
// ======================
let shake = 0;

function cameraShake() {
    shake = 20;
}

function applyShake() {
    if (shake > 0) {
        camera.position.x += (Math.random() - 0.5) * 0.3;
        camera.position.y += (Math.random() - 0.5) * 0.3;
        shake--;
    }
}

// ======================
// LOOP
// ======================
function animate() {
    requestAnimationFrame(animate);

    // only update game state when started and not paused
    if (started && !paused) {
        updateCar();
        updateTraffic();
        applyShake();

        distance += speed * 2;
        score = Math.floor(distance);

        document.getElementById("speed").innerText = Math.round(speed * 80);
        document.getElementById("dist").innerText = Math.floor(distance);
        document.getElementById("score").innerText = score;
    }

    // always render so user sees scene before start
    renderer.render(scene, camera);
}

// ======================
// START SCREEN
// ======================
function createStartScreen() {

    const s = document.createElement("div");
    s.id = "startScreen";
    s.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    color:white;z-index:9999;
    `;

    s.innerHTML = `
    <h1>🚙 سباق شاحنات الوحوش V2</h1>
    <button onclick="startGame()" style="padding:15px 30px;font-size:18px">
        ابدأ اللعب
    </button>
    `;

    document.body.appendChild(s);
}

function startGame() {
    started = true;
    const s = document.getElementById("startScreen");
    if (s) s.remove();
}

// ======================
// RESIZE
// ======================
window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
