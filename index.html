<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق السيارات الاحترافي - حركة واصطدام</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050b14; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-wrap: wrap; width: 220px; direction: ltr; }
        #mobilePanel button { width: 65px; height: 65px; font-size: 16px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #222; border-radius: 14px; cursor: pointer; font-weight: bold; }
        #mobilePanel button:active { background: #ff0055; color: white; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.7); padding: 12px; z-index: 1000; border-radius: 8px; text-align: right; direction: rtl; border: 1px solid #ff0055; }
        #clearCacheBtn { position: fixed; top: 10px; left: 10px; z-index: 5000; padding: 10px; background: #ffaa00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #crashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 9999; }
        #crashBox { background: white; padding: 30px; border-radius: 15px; text-align: center; border: 4px solid #222; direction: rtl; }
        #crashBox h2 { margin: 0 0 15px 0; color: #e63946; }
        #crashBox button { padding: 10px 20px; font-size: 16px; background: #222; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<button id="clearCacheBtn" onclick="forceReload()">تحديث كاش المتصفح 🔄</button>

<div id="hudPanel" style="display: none;"><b>السرعة:</b> <span id="speedVal">0</span> كم/س</div>

<div id="crashScreen">
    <div id="crashBox">
        <h2>💥 لقد اصطدمت بالسيارة!</h2>
        <p>حاول التجاوز بحذر في المرة القادمة.</p>
        <button onclick="restartGame()">إعادة المحاولة 🔄</button>
    </div>
</div>

<div id="mobilePanel">
    <button id="gasBtn">بنزين</button>
    <button id="brakeBtn">فرملة</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>

<script>
    function forceReload() { window.location.reload(true); }

    let scene, camera, renderer, raceCar;
    let carSpeed = 0;
    const keys = {};
    let trafficCars = [];
    let isCrashed = false;
    const roadLength = 4000;
    const roadWidth = 60;
    
    // إعداد ملف الصوت المحرك الممرر من قبلك
    let engineSound = new Audio('engain.mp3');
    engineSound.loop = true;
    let audioStarted = false;

    function startAudio() {
        if (!audioStarted && !isCrashed) {
            engineSound.play().catch(e => console.log("في انتظار التفاعل للشحن"));
            audioStarted = true;
        }
    }

    window.addEventListener('load', () => {
        if (typeof THREE === 'undefined') return;
        initGame();
    });

    function initGame() {
        document.getElementById('hudPanel').style.display = 'block';
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1d);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(0, 30, 10);
        scene.add(dirLight);

        // الطريق والخطوط الصفراء الممتدة
        const asphalt = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.5, roadLength), new THREE.MeshBasicMaterial({ color: 0x1f242e }));
        asphalt.position.y = -0.25;
        scene.add(asphalt);

        for (let z = -roadLength/2; z <= roadLength/2; z += 120) {
            const centerLine = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 40), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
            centerLine.position.set(0, 0.05, z);
            scene.add(centerLine);
        }

        // بناء ناطحات سحاب جانبية
        for (let i = 0; i < 40; i++) {
            let bx = (Math.random() - 0.5) * 600;
            let bz = (Math.random() - 0.5) * roadLength;
            if (Math.abs(bx) > roadWidth / 2 + 20) {
                const h = 100 + Math.random() * 200;
                const bMesh = new THREE.Mesh(new THREE.BoxGeometry(40, h, 40), new THREE.MeshBasicMaterial({ color: 0x141b2d }));
                bMesh.position.set(bx, h / 2, bz);
                scene.add(bMesh);
            }
        }

        // إنشاء سيارة اللاعب الرئيسية (الحمراء)
        raceCar = createCustomCar(0xe63946);
        raceCar.position.set(0, 0, 400);
        scene.add(raceCar);

        // توليد سيارات متحركة في الطريق (Traffic)
        const colors = [0x0077ff, 0x00b4d8, 0x2a9d8f, 0xe9c46a];
        for (let i = 0; i < 8; i++) {
            let tCar = createCustomCar(colors[i % colors.length]);
            resetTrafficCar(tCar);
            tCar.position.z = -200 - (i * 250); // توزيعها على مسافات متفرقة
            scene.add(tCar);
            trafficCars.push(tCar);
        }

        // ربط أزرار التحكم اللمسية
        bindBtn("gasBtn", "gas"); bindBtn("brakeBtn", "brake");
        bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");

        animate();
    }

    // دالة مرنة لبناء مجسم سيارة متكامل بالعجلات والزجاج والرفارف
    function createCustomCar(bodyColor) {
        const carGroup = new THREE.Group();
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(4.6, 1.1, 8.5), new THREE.MeshBasicMaterial({ color: bodyColor }));
        body.position.y = 0.75;
        carGroup.add(body);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.9, 3.8), new THREE.MeshBasicMaterial({ color: 0x111111 }));
        cabin.position.set(0, 1.6, -0.4);
        carGroup.add(cabin);

        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.15, 1.0), new THREE.MeshBasicMaterial({ color: 0x111111 }));
        spoiler.position.set(0, 1.8, 3.8);
        carGroup.add(spoiler);

        const tailL = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.25, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        tailL.position.set(-1.6, 0.75, 4.26);
        const tailR = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.25, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        tailR.position.set(1.6, 0.75, 4.26);
        carGroup.add(tailL, tailR);

        const wGeom = new THREE.CylinderGeometry(0.65, 0.65, 0.7, 12);
        const wMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const positions = [[-2.4, -2.2], [2.4, -2.2], [-2.4, 2.2], [2.4, 2.2]];
        
        positions.forEach(p => {
            const w = new THREE.Mesh(wGeom, wMat);
            w.rotation.z = Math.PI / 2;
            w.position.set(p[0], 0.65, p[1]);
            carGroup.add(w);
        });

        return carGroup;
    }

    function resetTrafficCar(car) {
        // وضع السيارة في حارة عشوائية (يمين، وسط، أو يسار)
        const lanes = [-18, 0, 18];
        car.position.x = lanes[Math.floor(Math.random() * lanes.length)];
        car.position.z = raceCar.position.z - (600 + Math.random() * 400);
        car.userData = { speed: 1 + Math.random() * 1.5 }; // سرعة السيارة المعادية
    }

    function bindBtn(id, key) {
        const btn = document.getElementById(id);
        if (!btn) return;
        const press = (e) => { e.preventDefault(); startAudio(); if(!isCrashed) keys[key] = true; };
        const release = () => { keys[key] = false; };
        
        btn.addEventListener("touchstart", press); btn.addEventListener("touchend", release);
        btn.addEventListener("mousedown", press); btn.addEventListener("mouseup", release);
    }

    function checkCollisions() {
        // حافة السيارة التصادمية المبسطة
        const playerBox = new THREE.Box3().setFromObject(raceCar);

        trafficCars.forEach(tCar => {
            const trafficBox = new THREE.Box3().setFromObject(tCar);
            
            if (playerBox.intersectsBox(trafficBox)) {
                triggerCrash();
            }
        });
    }

    function triggerCrash() {
        isCrashed = true;
        carSpeed = 0;
        engineSound.pause(); // إيقاف صوت المحرك عند الاصطدام
        document.getElementById('crashScreen').style.display = 'flex';
    }

    function restartGame() {
        isCrashed = false;
        raceCar.position.set(0, 0, 400);
        trafficCars.forEach(resetTrafficCar);
        document.getElementById('crashScreen').style.display = 'none';
        if (audioStarted) engineSound.play();
    }

    function updatePhysics() {
        if (isCrashed) return;

        if (keys["gas"]) carSpeed += 0.07;
        else if (keys["brake"]) carSpeed -= 0.15;
        else carSpeed *= 0.97;

        carSpeed = Math.max(0, Math.min(5.5, carSpeed));

        if (keys["left"]) raceCar.position.x -= carSpeed * 0.35;
        if (keys["right"]) raceCar.position.x += carSpeed * 0.35;

        // منع خروج السيارة عن حدود الأسفلت
        raceCar.position.x = Math.max(-roadWidth/2 + 3, Math.min(roadWidth/2 - 3, raceCar.position.x));

        raceCar.position.z -= carSpeed * 3.5;

        // تحريك وتحديث السيارات في الطريق
        trafficCars.forEach(tCar => {
            tCar.position.z -= tCar.userData.speed * 3.5;
            
            // إذا تجاوز اللاعب السيارة وأصبحت خلفه بمسافة كبيرة يتم إعادة تدويرها للأمام
            if (tCar.position.z > raceCar.position.z + 150) {
                resetTrafficCar(tCar);
            }
        });

        checkCollisions();

        if (audioStarted && !isCrashed) {
            engineSound.playbackRate = 0.85 + (carSpeed / 5.5) * 1.3;
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();

        if (raceCar) {
            camera.position.set(raceCar.position.x, raceCar.position.y + 4.5, raceCar.position.z + 16);
            camera.lookAt(raceCar.position.x, raceCar.position.y + 1.2, raceCar.position.z - 15);
            document.getElementById('speedVal').innerText = Math.round(carSpeed * 42);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
