<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Monster Truck Race 3D Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: sans-serif;
}

#hud {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
    z-index: 10;
}

#mobileControls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    display: flex;
    gap: 10px;
}

button {
    padding: 12px;
    font-size: 16px;
}
</style>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<div id="hud">
🚗 السرعة: <span id="speed">0</span><br>
🏁 المسافة: <span id="dist">0</span><br>
⭐ النقاط: <span id="score">0</span><br>
</div>

<div id="mobileControls">
<button onclick="tap('up')">⬆️</button>
<button onclick="tap('left')">⬅️</button>
<button onclick="tap('down')">⬇️</button>
<button onclick="tap('right')">➡️</button>
</div>

<script>

// ======================
// BASIC SETUP
// ======================
let scene, camera, renderer;
let car;
let speed = 0;
let maxSpeed = 3.2;
let acceleration = 0.03;
let friction = 0.97;

let keys = {};
let started = false;
let isCrashed = false;

let distance = 0;
let score = 0;

let traffic = [];
let lanes = [-4, 0, 4];

init();
createStartScreen();
animate();

// ======================
// INIT
// ======================
function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        2000
    );

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌞 LIGHTING (IMPORTANT FOR REALISM)
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(80, 120, 50);

    scene.add(ambient, sun);

    camera.position.set(0, 5, 10);

    createWorld();
    car = createCar();
    createTraffic();
}

// ======================
// WORLD
// ======================
function createWorld() {

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(2000, 2000),
        new THREE.MeshLambertMaterial({ color: 0x4caf50 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    scene.add(ground);

    const road = new THREE.Mesh(
        new THREE.BoxGeometry(20, 0.5, 2000),
        new THREE.MeshLambertMaterial({ color: 0x333333 })
    );
    scene.add(road);

    for (let i = 0; i < 80; i++) {
        const line = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.1, 5),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        line.position.set(0, 0.3, -i * 25);
        scene.add(line);
    }
}

// ======================
// 🚗 REALISTIC CAR
// ======================
function createCar() {

    const car = new THREE.Group();

    // BODY (main frame)
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(3.4, 1.2, 6),
        new THREE.MeshStandardMaterial({
            color: 0xe63946,
            metalness: 0.3,
            roughness: 0.4
        })
    );
    body.position.y = 1.5;
    car.add(body);

    // CABIN (glass)
    const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 1.2, 3),
        new THREE.MeshStandardMaterial({
            color: 0x111111,
            transparent: true,
            opacity: 0.75,
            metalness: 0.1,
            roughness: 0.2
        })
    );
    cabin.position.set(0, 2.3, -0.8);
    car.add(cabin);

    // FRONT BUMPER
    const bumperMat = new THREE.MeshStandardMaterial({
        color: 0x222222,
        metalness: 0.7,
        roughness: 0.3
    });

    const frontBumper = new THREE.Mesh(
        new THREE.BoxGeometry(3.5, 0.4, 0.8),
        bumperMat
    );
    frontBumper.position.set(0, 1.1, 3.2);
    car.add(frontBumper);

    const backBumper = frontBumper.clone();
    backBumper.position.z = -3.2;
    car.add(backBumper);

    // 🚗 WHEELS (realistic truck tires)
    const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.7, 32);
    const wheelMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        roughness: 0.9,
        metalness: 0.1
    });

    const wheelPos = [
        [-1.8, 1, 2.2],
        [1.8, 1, 2.2],
        [-1.8, 1, -2.2],
        [1.8, 1, -2.2],
    ];

    wheelPos.forEach(p => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(p[0], p[1], p[2]);
        car.add(w);
    });

    // 💡 HEADLIGHTS
    const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });

    const l1 = new THREE.Mesh(new THREE.SphereGeometry(0.12), lightMat);
    const l2 = l1.clone();

    l1.position.set(-1.2, 1.4, 3.4);
    l2.position.set(1.2, 1.4, 3.4);

    car.add(l1, l2);

    car.position.set(0, 0, 5);
    scene.add(car);

    return car;
}

// ======================
// TRAFFIC
// ======================
function createTrafficCar() {

    const c = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.6, 1, 4.5),
        new THREE.MeshStandardMaterial({
            color: Math.random() * 0xffffff,
            roughness: 0.5
        })
    );
    body.position.y = 1.2;

    c.add(body);

    resetTraffic(c);

    scene.add(c);
    return c;
}

function resetTraffic(c) {
    c.position.x = lanes[Math.floor(Math.random() * lanes.length)];
    c.position.z = car.position.z - 200 - Math.random() * 400;
}

function createTraffic() {
    for (let i = 0; i < 8; i++) {
        traffic.push(createTrafficCar());
    }
}

// ======================
// INPUT
// ======================
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function tap(dir) {
    if (dir === "up") keys["arrowup"] = true;
    if (dir === "down") keys["arrowdown"] = true;
    if (dir === "left") keys["arrowleft"] = true;
    if (dir === "right") keys["arrowright"] = true;

    setTimeout(() => keys = {}, 150);
}

// ======================
// UPDATE CAR
// ======================
function updateCar() {

    if (!car) return;

    if (keys["arrowup"]) speed += acceleration;
    if (keys["arrowdown"]) speed -= acceleration * 1.5;

    speed *= friction;
    speed = Math.max(0, Math.min(maxSpeed, speed));

    if (keys["arrowleft"]) car.position.x -= 0.15;
    if (keys["arrowright"]) car.position.x += 0.15;

    car.position.z -= speed * 2;

    camera.position.x += (car.position.x - camera.position.x) * 0.08;
    camera.position.z = car.position.z + 10;
    camera.position.y = 6;
    camera.lookAt(car.position);
}

// ======================
// TRAFFIC UPDATE
// ======================
function updateTraffic() {

    traffic.forEach(t => {

        t.position.z += 0.6 + speed * 2;

        if (t.position.z > car.position.z + 20) {
            resetTraffic(t);
        }

        if (Math.abs(t.position.x - car.position.x) < 2 &&
            Math.abs(t.position.z - car.position.z) < 3) {
            crash();
        }
    });
}

// ======================
// CRASH
// ======================
function crash() {

    if (isCrashed) return;

    isCrashed = true;
    speed = 0;

    alert("💥 تحطّم!");

    setTimeout(resetGame, 1200);
}

function resetGame() {
    isCrashed = false;
    car.position.set(0, 0, 5);
    speed = 0;
}

// ======================
// LOOP
// ======================
function animate() {

    requestAnimationFrame(animate);

    if (started && !isCrashed) {

        updateCar();
        updateTraffic();

        distance += speed * 2;
        score = Math.floor(distance);

        document.getElementById("speed").innerText = Math.round(speed * 80);
        document.getElementById("dist").innerText = Math.floor(distance);
        document.getElementById("score").innerText = score;
    }

    renderer.render(scene, camera);
}

// ======================
// START SCREEN
// ======================
function createStartScreen() {

    const s = document.createElement("div");
    s.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
    `;

    s.innerHTML = `
    <h1>🚙 Monster Truck Ultra</h1>
    <button onclick="startGame()" style="padding:15px 30px;font-size:18px">
        ابدأ اللعب
    </button>
    `;

    document.body.appendChild(s);
}

function startGame() {
    started = true;
    document.querySelector("div").remove();
}

// ======================
// RESIZE
// ======================
window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
