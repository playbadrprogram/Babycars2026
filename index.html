<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق الطبيعة الخلابة - سيارات الـ Monster Truck</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7ce5ff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-wrap: wrap; width: 230px; direction: ltr; }
        #mobilePanel button { width: 65px; height: 65px; font-size: 15px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #222; border-radius: 14px; cursor: pointer; font-weight: bold; }
        #mobilePanel button:active { background: #00b4d8; color: white; }
        #hornBtn { background: #ffcc00 !important; color: #000; }
        #hornBtn:active { background: #e6b800 !important; color: #fff; }
        
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.5); padding: 12px; z-index: 1000; border-radius: 8px; text-align: right; direction: rtl; border: 1px solid #2a9d8f; }
        #clearCacheBtn { position: fixed; top: 10px; left: 10px; z-index: 5000; padding: 10px; background: #ffaa00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #crashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.3); display: none; justify-content: center; align-items: center; z-index: 9999; }
        #crashBox { background: white; padding: 30px; border-radius: 15px; text-align: center; border: 4px solid #222; direction: rtl; }
        #crashBox h2 { margin: 0 0 15px 0; color: #e63946; }
        #crashBox button { padding: 10px 20px; font-size: 16px; background: #222; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<button id="clearCacheBtn" onclick="forceReload()">تحديث كاش المتصفح 🔄</button>

<div id="hudPanel" style="display: none;"><b>السرعة:</b> <span id="speedVal">0</span> كم/س</div>

<div id="crashScreen">
    <div id="crashBox">
        <h2>💥 لقد اصطدمت!</h2>
        <p>عد للسباق وحافظ على جمال الطبيعة من حولك.</p>
        <button onclick="restartGame()">إعادة المحاولة 🔄</button>
    </div>
</div>

<div id="mobilePanel">
    <button id="gasBtn">بنزين</button>
    <button id="brakeBtn">فرملة</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="hornBtn">تنبيه 🎺</button>
</div>

<script>
    function forceReload() { window.location.reload(true); }

    let scene, camera, renderer, raceCar;
    let carSpeed = 0;
    const keys = {};
    let trafficCars = [];
    let isCrashed = false;
    const roadLength = 4000;
    const roadWidth = 55;
    
    let engineSound = new Audio('engain.mp3');
    engineSound.loop = true;
    let hornSound = new Audio('horn.mp3'); 
    let audioStarted = false;
    let isPlayingSound = false;

    window.addEventListener('load', () => {
        if (typeof THREE === 'undefined') return;
        initGame();
    });

    function initGame() {
        document.getElementById('hudPanel').style.display = 'block';
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ce5ff); 

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.3));
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        sunLight.position.set(30, 60, 20);
        scene.add(sunLight);

        // مروج خضراء
        const greenMeadow = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshBasicMaterial({ color: 0x4caf50 }));
        greenMeadow.rotation.x = -Math.PI / 2;
        greenMeadow.position.y = -0.3;
        scene.add(greenMeadow);

        // طريق ريفي
        const asphalt = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.5, roadLength), new THREE.MeshBasicMaterial({ color: 0x666d75 }));
        asphalt.position.y = -0.25;
        scene.add(asphalt);

        for (let z = -roadLength/2; z <= roadLength/2; z += 120) {
            const centerLine = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 35), new THREE.MeshBasicMaterial({ color: 0xffeb3b }));
            centerLine.position.set(0, 0.05, z);
            scene.add(centerLine);
        }

        // غابة الأشجار المخروطية الجميلة
        for (let i = 0; i < 70; i++) {
            let bx = (Math.random() - 0.5) * 650;
            let bz = (Math.random() - 0.5) * roadLength;
            if (Math.abs(bx) > roadWidth / 2 + 15) {
                const treeGroup = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 5, 8), new THREE.MeshBasicMaterial({ color: 0x795548 }));
                trunk.position.y = 2.5;
                treeGroup.add(trunk);
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(4, 12, 8), new THREE.MeshBasicMaterial({ color: 0x2e7d32 }));
                leaves.position.y = 9;
                treeGroup.add(leaves);
                treeGroup.position.set(bx, 0, bz);
                scene.add(treeGroup);
            }
        }

        // إنشاء سيارة اللاعب بشكل الـ Monster Truck (اللون الأحمر المبهج)
        raceCar = createMonsterCar(0xe63946);
        raceCar.position.set(0, 0, 400);
        scene.add(raceCar);

        // سيارات المرور بنفس النمط الضخم والمرح
        const colors = [0x0288d1, 0x009688, 0xff9800, 0x9c27b0];
        for (let i = 0; i < 7; i++) {
            let tCar = createMonsterCar(colors[i % colors.length]);
            resetTrafficCar(tCar);
            tCar.position.z = -200 - (i * 280);
            scene.add(tCar);
            trafficCars.push(tCar);
        }

        bindBtn("gasBtn", "gas"); bindBtn("brakeBtn", "brake");
        bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");

        const hBtn = document.getElementById("hornBtn");
        if(hBtn) {
            hBtn.addEventListener("touchstart", (e) => { e.preventDefault(); if(!isCrashed) { hornSound.currentTime = 0; hornSound.play(); } });
            hBtn.addEventListener("mousedown", () => { if(!isCrashed) { hornSound.currentTime = 0; hornSound.play(); } });
        }

        animate();
    }

    // دالة بناء سيارة الدفع الرباعي العملاقة (Monster Truck) المطابقة لصورة المتجر
    function createMonsterCar(bodyColor) {
        const carGroup = new THREE.Group();
        
        // 1. جسم سيارة مرتفع وسميك ومستدير الحواف نسبياً
        const body = new THREE.Mesh(new THREE.BoxGeometry(5.2, 1.8, 8.0), new THREE.MeshBasicMaterial({ color: bodyColor }));
        body.position.y = 2.0; // مرفوعة عن الأرض
        carGroup.add(body);

        // 2. كابينة الركاب (الزجاج) المرتفعة ومستديرة الشكل
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(4.0, 1.4, 4.0), new THREE.MeshBasicMaterial({ color: 0x222222 }));
        cabin.position.set(0, 3.5, -0.5);
        carGroup.add(cabin);

        // 3. كشافات الإضاءة العلوية على السقف المميزة لسيارات الطرق الوعرة
        const lightBar = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.4, 0.4), new THREE.MeshBasicMaterial({ color: 0x111111 }));
        lightBar.position.set(0, 4.3, 0.5);
        carGroup.add(lightBar);
        for(let x = -1.2; x <= 1.2; x += 0.8) {
            const lightSpot = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.3, 8), new THREE.MeshBasicMaterial({ color: 0xffeb3b }));
            lightSpot.rotation.x = Math.PI / 2;
            lightSpot.position.set(x, 4.3, 0.7);
            carGroup.add(lightSpot);
        }

        // 4. مواسير العادم المرتفعة بالخلف (الكروم) كما بالصورة الكرتونية
        const pipe1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2.5, 8), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
        pipe1.position.set(-1.5, 3.5, 3.2);
        pipe1.rotation.x = -0.2;
        const pipe2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2.5, 8), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
        pipe2.position.set(1.5, 3.5, 3.2);
        pipe2.rotation.x = -0.2;
        carGroup.add(pipe1, pipe2);

        // 5. عجلات ضخمة جداً بارزة وعريضة للخارج (Monster Wheels)
        const wheelGeom = new THREE.CylinderGeometry(1.4, 1.4, 1.5, 16); // تكبير القطر والعرض
        const wheelMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
        const rimGeom = new THREE.CylinderGeometry(0.7, 0.7, 1.6, 12); // جنط داخلي لامع
        const rimMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });

        // مواقع العجلات الأربعة (متباعدة للخارج لتظهر القوة والثبات)
        const wheelPositions = [
            [-3.2, -2.5], [3.2, -2.5], 
            [-3.2, 2.5],  [3.2, 2.5]
        ];
        
        wheelPositions.forEach(pos => {
            const wheelInstance = new THREE.Mesh(wheelGeom, wheelMat);
            wheelInstance.rotation.z = Math.PI / 2;
            wheelInstance.position.set(pos[0], 1.4, pos[1]);
            
            const rimInstance = new THREE.Mesh(rimGeom, rimMat);
            rimInstance.rotation.z = Math.PI / 2;
            rimInstance.position.set(pos[0], 1.4, pos[1]);
            
            carGroup.add(wheelInstance, rimInstance);
        });

        return carGroup;
    }

    function resetTrafficCar(car) {
        const lanes = [-15, 0, 15];
        car.position.x = lanes[Math.floor(Math.random() * lanes.length)];
        car.position.z = raceCar.position.z - (600 + Math.random() * 450);
        car.userData = { speed: 1 + Math.random() * 1.5 };
    }

    function bindBtn(id, key) {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener("touchstart", (e) => { e.preventDefault(); if(!isCrashed) keys[key] = true; });
        btn.addEventListener("touchend", () => { keys[key] = false; });
        btn.addEventListener("mousedown", () => { if(!isCrashed) keys[key] = true; });
        btn.addEventListener("mouseup", () => { keys[key] = false; });
    }

    function checkCollisions() {
        const playerBox = new THREE.Box3().setFromObject(raceCar);
        trafficCars.forEach(tCar => {
            const trafficBox = new THREE.Box3().setFromObject(tCar);
            if (playerBox.intersectsBox(trafficBox)) {
                isCrashed = true;
                carSpeed = 0;
                engineSound.pause();
                isPlayingSound = false;
                document.getElementById('crashScreen').style.display = 'flex';
            }
        });
    }

    function restartGame() {
        isCrashed = false;
        raceCar.position.set(0, 0, 400);
        trafficCars.forEach(resetTrafficCar);
        document.getElementById('crashScreen').style.display = 'none';
    }

    function handleEngineAudio() {
        if (isCrashed) return;

        if (carSpeed > 0.05) {
            if (!isPlayingSound) {
                engineSound.play().catch(e => console.log("تفاعل مطلوب"));
                isPlayingSound = true;
            }
            engineSound.playbackRate = 0.75 + (carSpeed / 5.5) * 1.4;
        } else {
            if (isPlayingSound) {
                engineSound.pause();
                isPlayingSound = false;
            }
        }
    }

    function updatePhysics() {
        if (isCrashed) return;

        if (keys["gas"]) carSpeed += 0.06;
        else if (keys["brake"]) carSpeed -= 0.14;
        else carSpeed *= 0.96;

        carSpeed = Math.max(0, Math.min(5.5, carSpeed));

        if (keys["left"]) raceCar.position.x -= carSpeed * 0.35;
        if (keys["right"]) raceCar.position.x += carSpeed * 0.35;

        raceCar.position.x = Math.max(-roadWidth/2 + 4, Math.min(roadWidth/2 - 4, raceCar.position.x));
        raceCar.position.z -= carSpeed * 3.5;

        trafficCars.forEach(tCar => {
            tCar.position.z -= tCar.userData.speed * 3.5;
            if (tCar.position.z > raceCar.position.z + 180) {
                resetTrafficCar(tCar);
            }
        });

        checkCollisions();
        handleEngineAudio();
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();

        if (raceCar) {
            // ضبط زاوية الكاميرا لتناسب حجم السيارات الجديد والضخم
            camera.position.set(raceCar.position.x, raceCar.position.y + 6.5, raceCar.position.z + 22);
            camera.lookAt(raceCar.position.x, raceCar.position.y + 1.8, raceCar.position.z - 15);
            document.getElementById('speedVal').innerText = Math.round(carSpeed * 42);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
