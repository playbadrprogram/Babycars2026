<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي سباق السيارات ثلاثي الأبعاد</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050b14; font-family: sans-serif; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-wrap: wrap; width: 220px; direction: ltr; }
        #mobilePanel button { width: 65px; height: 65px; font-size: 16px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #222; border-radius: 14px; cursor: pointer; -webkit-user-select: none; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #ff0055; color: white; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.7); padding: 12px; z-index: 1000; border-radius: 8px; text-align: right; direction: rtl; border: 1px solid #ff0055; min-width: 120px; }
        #crashScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 30px; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="crashScreen" onclick="location.reload()">
    <div>💥 حادث اصطدام قوي! 💥</div>
    <div style="font-size: 18px; margin-top: 15px;">إضغط هنا لإعادة المحاولة</div>
</div>

<div id="mobilePanel">
    <button id="gasBtn">بنزين</button>
    <button id="brakeBtn">فرملة</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        try {
            // =====================================
            // نظام صوت المحرك الاصطناعي (Web Audio API)
            // =====================================
            let audioCtx = null;
            let carOsc = null;
            let carGain = null;

            function initCarAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                carOsc = audioCtx.createOscillator();
                carOsc.type = 'triangle'; // صوت خشن يناسب محركات السيارات
                carOsc.frequency.setValueAtTime(40, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);

                carGain = audioCtx.createGain();
                carGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

                carOsc.connect(filter);
                filter.connect(carGain);
                carGain.connect(audioCtx.destination);
                
                carOsc.start();
            }

            function startAudio() {
                initCarAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
            document.body.addEventListener('touchstart', startAudio);
            document.body.addEventListener('click', startAudio);

            // =====================================
            // إعداد المشهد والبيئة الحضرية
            // =====================================
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1128); // أجواء ليلية للمدينة
            scene.fog = new THREE.FogExp2(0x0a1128, 0.0002);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 50000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة ليلية خافتة مع أضواء الشوارع
            scene.add(new THREE.AmbientLight(0x333355, 0.9));
            const moonLight = new THREE.DirectionalLight(0x8899ff, 0.6);
            moonLight.position.set(500, 1000, 500);
            scene.add(moonLight);

            // الأرضية المحيطة بالطريق
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(100000, 100000),
                new THREE.MeshStandardMaterial({ color: 0x11151c, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // =====================================
            // تصميم طريق المدينة السريع المستقر
            // =====================================
            const roadGroup = new THREE.Group();
            const roadLength = 30000;
            const roadWidth = 120;

            const asphalt = new THREE.Mesh(
                new THREE.BoxGeometry(roadWidth, 0.6, roadLength),
                new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 })
            );
            asphalt.position.set(0, 0.3, 0);
            roadGroup.add(asphalt);

            // خطوط مسارات الطريق الصفراء والبيضاء
            for (let z = -roadLength/2; z <= roadLength/2; z += 120) {
                // خط متقطع في المنتصف
                const centerLine = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 40), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                centerLine.position.set(0, 0.61, z);
                roadGroup.add(centerLine);

                // خطوط الحواف الصفراء
                const leftEdge = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 120), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
                leftEdge.position.set(-roadWidth/2 + 2, 0.61, z);
                roadGroup.add(leftEdge);

                const rightEdge = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 120), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
                rightEdge.position.set(roadWidth/2 - 2, 0.61, z);
                roadGroup.add(rightEdge);
            }
            scene.add(roadGroup);

            // =====================================
            // بناء ناطحات السحاب للمدينة الحقيقية
            // =====================================
            const collidableBuildings = [];
            function createCityBuilding(x, z) {
                const w = 70 + Math.random() * 50;
                const h = 300 + Math.random() * 600;
                const d = 70 + Math.random() * 50;

                const bMat = new THREE.MeshStandardMaterial({ color: 0x1b263b, roughness: 0.3 });
                const bMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bMat);
                bMesh.position.set(x, h / 2, z);
                scene.add(bMesh);
                collidableBuildings.push(bMesh);

                // أضواء ناطحات السحاب الملونة لتبدو حقيقية
                const winGeo = new THREE.BoxGeometry(w + 1, 3, d + 1);
                const winMat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    emissive: Math.random() > 0.5 ? 0x00f0ff : 0xffaa00, 
                    emissiveIntensity: 0.7 
                });
                for (let y = 50; y < h - 40; y += 50) {
                    const row = new THREE.Mesh(winGeo, winMat);
                    row.position.set(x, y, z);
                    scene.add(row);
                }
            }

            // توزيع ناطحات السحاب على جانبي الطريق الممتد
            for (let i = 0; i < 400; i++) {
                let bx = (Math.random() - 0.5) * 4000;
                let bz = (Math.random() - 0.5) * roadLength;
                // إبعاد المباني عن مسار الشارع لمنع سد الطريق
                if (Math.abs(bx) > roadWidth / 2 + 60) {
                    createCityBuilding(bx, bz);
                }
            }

            // =====================================
            // تصميم سيارة السباق الرياضية (3D)
            // =====================================
            function buildRaceCar() {
                const car = new THREE.Group();
                const redMat = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.2 }); // لون السيارة أحمر رياضي
                const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1 });

                // الشاصيه الرئيسي السفلي
                const base = new THREE.Mesh(new THREE.BoxGeometry(4.6, 0.6, 9), redMat);
                base.position.y = 0.5;
                car.add(base);

                // كابينة القيادة والزجاج الانسيابي
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.9, 4), redMat);
                cabin.position.set(0, 1.2, 0.5);
                car.add(cabin);

                const windshield = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.8, 1.5), glassMat);
                windshield.position.set(0, 1.2, -1.8);
                windshield.rotation.x = -Math.PI / 4;
                car.add(windshield);

                // الجناح الرياضي الخلفي (Spoiler) لتحسين المظهر
                const spoilerSupport = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.5), blackMat);
                spoilerSupport.position.set(1.5, 1.2, 4);
                car.add(spoilerSupport.clone().position.set(-1.5, 1.2, 4));
                car.add(spoilerSupport);

                const wing = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.15, 1.2), redMat);
                wing.position.set(0, 1.7, 4);
                car.add(wing);

                // العجلات الأربعة المضافة بدقة
                const wheelGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.9, 16);
                wheelGeo.rotateZ(Math.PI / 2);

                const wFL = new THREE.Mesh(wheelGeo, blackMat); wFL.position.set(-2.4, 0.7, -2.5); car.add(wFL);
                const wFR = new THREE.Mesh(wheelGeo, blackMat); wFR.position.set(2.4, 0.7, -2.5); car.add(wFR);
                const wBL = new THREE.Mesh(wheelGeo, blackMat); wBL.position.set(-2.4, 0.7, 2.5); car.add(wBL);
                const wBR = new THREE.Mesh(wheelGeo, blackMat); wBR.position.set(2.4, 0.7, 2.5); car.add(wBR);

                // الكشافات الأمامية المضيئة
                const lightGeo = new THREE.BoxGeometry(0.6, 0.3, 0.2);
                const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff });
                const headlightL = new THREE.Mesh(lightGeo, lightMat); headlightL.position.set(-1.8, 0.7, -4.5); car.add(headlightL);
                const headlightR = new THREE.Mesh(lightGeo, lightMat); headlightR.position.set(1.8, 0.7, -4.5); car.add(headlightR);

                return car;
            }

            const raceCar = buildRaceCar();
            raceCar.position.set(0, 0.6, roadLength / 2 - 200); // وضع البداية
            scene.add(raceCar);

            // =====================================
            // فيزياء التحكم والقيادة
            // =====================================
            let carSpeed = 0;
            let isCrashed = false;
            const keys = {};

            const hud = document.createElement("div"); hud.id = "hudPanel"; document.body.appendChild(hud);

            function bindBtn(id, key) {
                const btn = document.getElementById(id); if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); startAudio(); keys[key] = true; });
                btn.addEventListener("touchend", () => { keys[key] = false; });
                btn.addEventListener("mousedown", () => { startAudio(); keys[key] = true; });
                btn.addEventListener("mouseup", () => { keys[key] = false; });
            }

            bindBtn("gasBtn", "gas"); bindBtn("brakeBtn", "brake");
            bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");

            // دعم لوحة مفاتيح الكمبيوتر أيضاً (الأسهام أو WASD)
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowUp' || e.key === 'w') keys['gas'] = true;
                if(e.key === 'ArrowDown' || e.key === 's') keys['brake'] = true;
                if(e.key === 'ArrowLeft' || e.key === 'a') keys['left'] = true;
                if(e.key === 'ArrowRight' || e.key === 'd') keys['right'] = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === 'ArrowUp' || e.key === 'w') keys['gas'] = false;
                if(e.key === 'ArrowDown' || e.key === 's') keys['brake'] = false;
                if(e.key === 'ArrowLeft' || e.key === 'a') keys['left'] = false;
                if(e.key === 'ArrowRight' || e.key === 'd') keys['right'] = false;
            });

            function updatePhysics() {
                if (isCrashed) return;

                // الضغط على الغاز والفرامل
                if (keys["gas"]) carSpeed += 0.08;
                else if (keys["brake"]) carSpeed -= 0.15;
                else carSpeed *= 0.98; // التباطؤ التلقائي بسبب الاحتكاك

                carSpeed = Math.max(0, Math.min(6.5, carSpeed)); // السرعة القصوى للسباق

                // تحديث تردد وقوة صوت محرك السيارة تلقائياً مع السرعة
                if (carGain && carOsc) {
                    carGain.gain.setTargetAtTime(carSpeed * 0.06, audioCtx.currentTime, 0.1);
                    carOsc.frequency.setTargetAtTime(40 + (carSpeed * 35), audioCtx.currentTime, 0.1);
                }

                // الالتفاف يميناً ويساراً بناءً على حركة السيارة
                if (carSpeed > 0.2) {
                    if (keys["left"]) {
                        raceCar.position.x -= carSpeed * 0.4;
                        raceCar.rotation.y = 0.15; // إمالة خفيفة للسيارة أثناء الالتفاف
                    } else if (keys["right"]) {
                        raceCar.position.x += carSpeed * 0.4;
                        raceCar.rotation.y = -0.15;
                    } else {
                        raceCar.rotation.y *= 0.8; // استعادة الاستقامة عند ترك الزر
                    }
                }

                // تحريك السيارة للأمام على الطريق السريع
                raceCar.position.z -= carSpeed * 5;

                // الحماية والاصطدام عند الخروج التام عن حدود الشارع والارتطام بالمباني الجانبية
                if (Math.abs(raceCar.position.x) > roadWidth / 2 - 3) {
