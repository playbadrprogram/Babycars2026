<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي السباق المطوّر - سيارة حقيقية وصوت تفاعلي</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050b14; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-wrap: wrap; width: 220px; direction: ltr; }
        #mobilePanel button { width: 65px; height: 65px; font-size: 16px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #222; border-radius: 14px; cursor: pointer; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #ff0055; color: white; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.7); padding: 12px; z-index: 1000; border-radius: 8px; text-align: right; direction: rtl; border: 1px solid #ff0055; }
        #clearCacheBtn { position: fixed; top: 10px; left: 10px; z-index: 5000; padding: 10px; background: #ffaa00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<button id="clearCacheBtn" onclick="forceReload()">تحديث كاش المتصفح 🔄</button>

<div id="mobilePanel">
    <button id="gasBtn">بنزين</button>
    <button id="brakeBtn">فرملة</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>

<script>
    function forceReload() {
        window.location.reload(true);
    }

    window.addEventListener('load', () => {
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = "<div style='color:white; padding:50px; text-align:center; direction:rtl;'>تعذر الاتصال بمحرك الرسوميات.</div>";
            return;
        }

        try {
            // =====================================
            // إعداد نظام الصوت المطور
            // =====================================
            let engineSound = new Audio('engain.mp3'); // ربط ملف الصوت من مستودعك
            engineSound.loop = true;
            let audioStarted = false;

            function startEngineAudio() {
                if (!audioStarted) {
                    engineSound.play().catch(e => console.log("في انتظار تفاعل اللاعب لتشغيل الصوت"));
                    audioStarted = true;
                }
            }

            // إعداد المشهد والإضاءة المحسنة
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f1d); 

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة قوية لتظهر تفاصيل السيارة والعجلات بشكل جميل
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 20, 10);
            scene.add(dirLight);

            // الأرضية والطريق
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshBasicMaterial({ color: 0x0d1117 }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const roadGroup = new THREE.Group();
            const roadLength = 4000;
            const roadWidth = 80;

            const asphalt = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.5, roadLength), new THREE.MeshBasicMaterial({ color: 0x1f242e }));
            asphalt.position.y = -0.25;
            roadGroup.add(asphalt);

            for (let z = -roadLength/2; z <= roadLength/2; z += 120) {
                const centerLine = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 35), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                centerLine.position.set(0, 0.05, z);
                roadGroup.add(centerLine);
            }
            scene.add(roadGroup);

            // المباني المحيطة
            for (let i = 0; i < 40; i++) {
                let bx = (Math.random() - 0.5) * 700;
                let bz = (Math.random() - 0.5) * roadLength;
                if (Math.abs(bx) > roadWidth / 2 + 40) {
                    const h = 100 + Math.random() * 250;
                    const bMesh = new THREE.Mesh(new THREE.BoxGeometry(45, h, 45), new THREE.MeshBasicMaterial({ color: 0x1a233a }));
                    bMesh.position.set(bx, h / 2, bz);
                    scene.add(bMesh);
                }
            }

            // =====================================
            // 🏎️ بناء سيارة رياضية تفصيلية (Sports Car)
            // =====================================
            const raceCar = new THREE.Group();
            
            // 1. جسم السيارة الأساسي
            const carBody = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 9), new THREE.MeshBasicMaterial({ color: 0xe63946 }));
            carBody.position.y = 0.8;
            raceCar.add(carBody);

            // 2. كابينة القيادة والزجاج (السقف)
            const carCabin = new THREE.Mesh(new THREE.BoxGeometry(3.8, 1.0, 4), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            carCabin.position.set(0, 1.7, -0.5);
            raceCar.add(carCabin);

            // 3. الجناح الرياضي الخلفي (Spoiler)
            const spoilerSupport1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            spoilerSupport1.position.set(-1.8, 1.6, 4);
            const spoilerSupport2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            spoilerSupport2.position.set(1.8, 1.6, 4);
            const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.15, 1.2), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            spoilerWing.position.set(0, 2.0, 4);
            raceCar.add(spoilerSupport1, spoilerSupport2, spoilerWing);

            // 4. الكشافات الأمامية (Headlights)
            const lightLeft = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.2), new THREE.MeshBasicMaterial({ color: 0xffea00 }));
            lightLeft.position.set(-1.8, 0.8, -4.5);
            const lightRight = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.2), new THREE.MeshBasicMaterial({ color: 0xffea00 }));
            lightRight.position.set(1.8, 0.8, -4.5);
            raceCar.add(lightLeft, lightRight);

            // 5. المصابيح الخلفية الحمراء
            const tailLeft = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            tailLeft.position.set(-1.8, 0.8, 4.5);
            const tailRight = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            tailRight.position.set(1.8, 0.8, 4.5);
            raceCar.add(tailLeft, tailRight);

            // 6. إضافة الـ 4 عجلات (Wheels) باللون الأسود الداكن
            const wheelGeom = new THREE.CylinderGeometry(0.7, 0.7, 0.8, 16);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            
            const wheelFL = new THREE.Mesh(wheelGeom, wheelMat); wheelFL.rotation.z = Math.PI / 2; wheelFL.position.set(-2.6, 0.7, -2.5);
            const wheelFR = new THREE.Mesh(wheelGeom, wheelMat); wheelFR.rotation.z = Math.PI / 2; wheelFR.position.set(2.6, 0.7, -2.5);
            const wheelBL = new THREE.Mesh(wheelGeom, wheelMat); wheelBL.rotation.z = Math.PI / 2; wheelBL.position.set(-2.6, 0.7, 2.5);
            const wheelBR = new THREE.Mesh(wheelGeom, wheelMat); wheelBR.rotation.z = Math.PI / 2; wheelBR.position.set(2.6, 0.7, 2.5);
            
            raceCar.add(wheelFL, wheelFR, wheelBL, wheelBR);

            raceCar.position.set(0, 0, 300); 
            scene.add(raceCar);

            // =====================================
            // أزرار التحكم والحركة
            // =====================================
            let carSpeed = 0;
            const keys = {};

            const hud = document.createElement("div"); 
            hud.id = "hudPanel"; 
            document.body.appendChild(hud);

            function bindBtn(id, key) {
                const btn = document.getElementById(id);
                if (!btn) return;
                
                // تشغيل الصوت فور لمس الشاشة لأول مرة وتخطي حظر المتصفح
                const activateAudio = () => { startEngineAudio(); keys[key] = true; };
                
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); activateAudio(); });
                btn.addEventListener("touchend", () => { keys[key] = false; });
                btn.addEventListener("mousedown", activateAudio);
                btn.addEventListener("mouseup", () => { keys[key] = false; });
            }

            bindBtn("gasBtn", "gas"); bindBtn("brakeBtn", "brake");
            bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");

            function updatePhysics() {
                if (keys["gas"]) carSpeed += 0.06;
                else if (keys["brake"]) carSpeed -= 0.12;
                else carSpeed *= 0.97; // تباطؤ طبيعي عند ترك البنزين

                carSpeed = Math.max(0, Math.min(5, carSpeed)); 

                if (keys["left"]) raceCar.position.x -= carSpeed * 0.35;
                if (keys["right"]) raceCar.position.x += carSpeed * 0.35;

                raceCar.position.z -= carSpeed * 3.5;
                
                // تدوير العجلات الأربعة لإعطاء مظهر واقعي للحركة
                wheelFL.rotation.x -= carSpeed * 0.2;
                wheelFR.rotation.x -= carSpeed * 0.2;
                wheelBL.rotation.x -= carSpeed * 0.2;
                wheelBR.rotation.x -= carSpeed * 0.2;

                // إعادة تدوير الطريق اللانهائي
                if (raceCar.position.z < -roadLength/2) raceCar.position.z = roadLength/2;

                // =====================================
                // تفعيل تفاعل الصوت مع سرعة السيارة
                // =====================================
                if (audioStarted) {
                    // زيادة طبقة وسرعة الصوت تدريجياً بناءً على سرعة السيارة الحالية
                    engineSound.playbackRate = 0.85 + (carSpeed / 5) * 1.15; 
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updatePhysics();

                // كاميرا سينمائية خلف السيارة مباشرة لترى تفاصيل التصميم الجديد
                camera.position.set(raceCar.position.x, raceCar.position.y + 4.5, raceCar.position.z + 16);
                camera.lookAt(raceCar.position.x, raceCar.position.y + 1.2, raceCar.position.z - 15);

                hud.innerHTML = `<b>السرعة:</b> ${Math.round(carSpeed * 44)} كم/س`;
                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (error) {
            console.error(error);
        }
    });
</script>
</body>
</html>
