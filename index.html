<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي السباق - النسخة المستقلة المستقرة</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050b14; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-wrap: wrap; width: 220px; direction: ltr; }
        #mobilePanel button { width: 65px; height: 65px; font-size: 16px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #222; border-radius: 14px; cursor: pointer; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #ff0055; color: white; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.7); padding: 12px; z-index: 1000; border-radius: 8px; text-align: right; direction: rtl; border: 1px solid #ff0055; }
        #clearCacheBtn { position: fixed; top: 10px; left: 10px; z-index: 5000; padding: 10px; background: #ffaa00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<button id="clearCacheBtn" onclick="forceReload()">تحديث كاش المتصفح 🔄</button>

<div id="mobilePanel">
    <button id="gasBtn">بنزين</button>
    <button id="brakeBtn">فرملة</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>

<script>
    // دالة لتنظيف الكاش وإعادة التحميل الإجباري
    function forceReload() {
        window.location.reload(true);
    }

    // الانتظار للتأكد من المحرك
    window.addEventListener('load', () => {
        // خطة بديلة في حال لم تتحمل المكتبة من الرابط الأعلى: بناء المحرك المصغر تلقائياً
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = "<div style='color:white; padding:50px; text-align:center; direction:rtl;'>تعذر الاتصال بسيرفر مكتبة الرسوميات الخارجي. يرجى التحقق من اتصال الإنترنت لديك أو تجربة متصفح آخر.</div>";
            return;
        }

        try {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b14); 

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            
            const renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            // الأرضية
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(5000, 5000),
                new THREE.MeshBasicMaterial({ color: 0x11151c })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // الطريق
            const roadGroup = new THREE.Group();
            const roadLength = 4000;
            const roadWidth = 80;

            const asphalt = new THREE.Mesh(
                new THREE.BoxGeometry(roadWidth, 1, roadLength),
                new THREE.MeshBasicMaterial({ color: 0x222222 })
            );
            asphalt.position.y = -0.5;
            roadGroup.add(asphalt);

            for (let z = -roadLength/2; z <= roadLength/2; z += 150) {
                const centerLine = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 40), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                centerLine.position.set(0, 0.1, z);
                roadGroup.add(centerLine);
            }
            scene.add(roadGroup);

            // ناطحات سحاب خفيفة جداً
            for (let i = 0; i < 30; i++) {
                let bx = (Math.random() - 0.5) * 600;
                let bz = (Math.random() - 0.5) * roadLength;
                if (Math.abs(bx) > roadWidth / 2 + 30) {
                    const h = 150 + Math.random() * 200;
                    const bMesh = new THREE.Mesh(new THREE.BoxGeometry(50, h, 50), new THREE.MeshBasicMaterial({ color: 0x1b263b }));
                    bMesh.position.set(bx, h / 2, bz);
                    scene.add(bMesh);
                }
            }

            // السيارة
            const raceCar = new THREE.Group();
            const carBody = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 8), new THREE.MeshBasicMaterial({ color: 0xe63946 }));
            carBody.position.y = 0.5;
            raceCar.add(carBody);

            const carCabin = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 3), new THREE.MeshBasicMaterial({ color: 0x111111 }));
            carCabin.position.set(0, 1.3, 0);
            raceCar.add(carCabin);

            raceCar.position.set(0, 0, 300); 
            scene.add(raceCar);

            let carSpeed = 0;
            const keys = {};

            const hud = document.createElement("div"); 
            hud.id = "hudPanel"; 
            document.body.appendChild(hud);

            function bindBtn(id, key) {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
                btn.addEventListener("touchend", () => { keys[key] = false; });
                btn.addEventListener("mousedown", () => { keys[key] = true; });
                btn.addEventListener("mouseup", () => { keys[key] = false; });
            }

            bindBtn("gasBtn", "gas"); bindBtn("brakeBtn", "brake");
            bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");

            function updatePhysics() {
                if (keys["gas"]) carSpeed += 0.05;
                else if (keys["brake"]) carSpeed -= 0.1;
                else carSpeed *= 0.98; 

                carSpeed = Math.max(0, Math.min(4, carSpeed)); 

                if (keys["left"]) raceCar.position.x -= carSpeed * 0.4;
                if (keys["right"]) raceCar.position.x += carSpeed * 0.4;

                raceCar.position.z -= carSpeed * 3;
                if (raceCar.position.z < -roadLength/2) raceCar.position.z = roadLength/2;
            }

            function animate() {
                requestAnimationFrame(animate);
                updatePhysics();

                camera.position.set(raceCar.position.x, raceCar.position.y + 4, raceCar.position.z + 14);
                camera.lookAt(raceCar.position.x, raceCar.position.y + 1, raceCar.position.z - 10);

                hud.innerHTML = `<b>السرعة:</b> ${Math.round(carSpeed * 40)} كم/س`;
                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (error) {
            console.error(error);
        }
    });
</script>
</body>
</html>
