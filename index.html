<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Monster Truck Race 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: sans-serif;
}

#hud {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
    z-index: 10;
}

#mobileControls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    display: flex;
    gap: 10px;
}
button {
    padding: 12px;
    font-size: 16px;
}
</style>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<div id="hud">السرعة: <span id="speed">0</span> km/h</div>

<div id="mobileControls">
<button onclick="tapKey('arrowup')">⬆️</button>
<button onclick="tapKey('arrowleft')">⬅️</button>
<button onclick="tapKey('arrowdown')">⬇️</button>
<button onclick="tapKey('arrowright')">➡️</button>
</div>

<script>

// =====================
// BASIC SETUP
// =====================
let scene, camera, renderer;
let car, speed = 0;
let maxSpeed = 2.5;
let keys = {};
let started = false;
let paused = false;
let isCrashed = false;

let trafficCars = [];
let lanes = [-4, 0, 4];

init();
createStartScreen();
animate();

// =====================
// INIT
// =====================
function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        2000
    );

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light1 = new THREE.AmbientLight(0xffffff, 0.8);
    const light2 = new THREE.DirectionalLight(0xffffff, 1);
    light2.position.set(50, 100, 50);

    scene.add(light1, light2);

    camera.position.set(0, 5, 10);

    createEnvironment();
    car = createCar();
    initTraffic();
}

// =====================
// ENVIRONMENT
// =====================
function createEnvironment() {

    const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(2000, 2000),
        new THREE.MeshLambertMaterial({ color: 0x4caf50 })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.position.y = -0.5;
    scene.add(grass);

    const road = new THREE.Mesh(
        new THREE.BoxGeometry(20, 0.5, 2000),
        new THREE.MeshLambertMaterial({ color: 0x333333 })
    );
    scene.add(road);

    for (let i = 0; i < 60; i++) {
        const line = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.1, 5),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        line.position.set(0, 0.3, -i * 25);
        scene.add(line);
    }
}

// =====================
// CAR
// =====================
function createCar() {

    const car = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1.2, 6),
        new THREE.MeshLambertMaterial({ color: 0xe63946 })
    );
    body.position.y = 1.5;

    car.add(body);
    car.position.set(0, 0, 5);
    scene.add(car);

    return car;
}

// =====================
// TRAFFIC
// =====================
function createTrafficCar() {

    const car = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 1, 4.5),
        new THREE.MeshLambertMaterial({ color: 0x2196f3 })
    );
    body.position.y = 1.2;

    car.add(body);

    car.position.set(
        lanes[Math.floor(Math.random() * lanes.length)],
        0,
        car.position.z - 200 - Math.random() * 300
    );

    scene.add(car);
    return car;
}

function initTraffic() {
    for (let i = 0; i < 6; i++) {
        trafficCars.push(createTrafficCar());
    }
}

// =====================
// INPUT
// =====================
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function tapKey(k) {
    keys[k] = true;
    setTimeout(() => keys[k] = false, 150);
}

// =====================
// UPDATE CAR
// =====================
function updateCar() {

    if (!car) return;

    if (keys["w"] || keys["arrowup"]) speed += 0.02;
    if (keys["s"] || keys["arrowdown"]) speed -= 0.03;

    speed *= 0.98;
    speed = Math.max(0, Math.min(maxSpeed, speed));

    if (keys["a"] || keys["arrowleft"]) car.position.x -= 0.15;
    if (keys["d"] || keys["arrowright"]) car.position.x += 0.15;

    car.position.z -= speed * 2;

    camera.position.x += (car.position.x - camera.position.x) * 0.1;
    camera.position.z = car.position.z + 10;
    camera.position.y = 6;
    camera.lookAt(car.position);
}

// =====================
// TRAFFIC UPDATE
// =====================
function updateTraffic() {

    trafficCars.forEach(t => {

        t.position.z += 0.5 + speed * 2;

        if (t.position.z > car.position.z + 20) {
            t.position.z = car.position.z - 200 - Math.random() * 300;
            t.position.x = lanes[Math.floor(Math.random() * lanes.length)];
        }

        if (Math.abs(t.position.x - car.position.x) < 2 &&
            Math.abs(t.position.z - car.position.z) < 3) {
            crash();
        }
    });
}

// =====================
// CRASH
// =====================
function crash() {

    if (isCrashed) return;

    isCrashed = true;
    speed = 0;

    alert("💥 لقد اصطدمت!");

    setTimeout(resetGame, 1000);
}

function resetGame() {
    isCrashed = false;
    car.position.set(0, 0, 5);
    speed = 0;
}

// =====================
// LOOP
// =====================
function animate() {
    requestAnimationFrame(animate);

    if (!started || paused) return;

    updateCar();
    updateTraffic();

    document.getElementById("speed").innerText =
        Math.round(speed * 80);

    renderer.render(scene, camera);
}

// =====================
// START SCREEN
// =====================
function createStartScreen() {

    const div = document.createElement("div");
    div.style = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.7);
        display:flex;align-items:center;justify-content:center;
        flex-direction:column;color:white;z-index:9999;
    `;

    div.innerHTML = `
        <h1>🚙 Monster Truck Race</h1>
        <button onclick="startGame()" style="padding:15px 30px;font-size:18px">
            ابدأ اللعب
        </button>
    `;

    document.body.appendChild(div);
}

function startGame() {
    started = true;
    document.querySelector("div").style.display = "none";
}

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
